services:
  grocery-tracker:
    build: .
    container_name: grocery-tracker
    restart: unless-stopped
    environment:
      - DATABASE_URL=file:/data/prices.db
      - NODE_ENV=production
    volumes:
      - db-data:/data
    networks:
      - apps
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:7800/api/stores"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  db-data:
    driver: local

networks:
  apps:
    external: true
