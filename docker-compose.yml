services:
  app:
    build: .
    ports:
      - "7800:7800"
    environment:
      - DATABASE_URL=file:/data/prices.db
      - NODE_ENV=production
    volumes:
      - db-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:7800/api/stores"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  db-data:
    driver: local
